<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans&display=swap" rel="stylesheet">
  <title>2026-27 Dartmouth Sports Branding Look</title>
  <style>
    body {
      font-family: 'DM Sans', sans-serif;
      background-color: rgb(251, 252, 255);
      color: #1a1a1a;
      margin: 0;
      padding: 40px 20px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      text-align: center;
      margin: 0 0 40px 0;
    }

    .gallery {
      display: grid;
      grid-template-columns: 1fr; /* one column on phones */
      gap: 20px;
      justify-items: center;
      max-width: 1600px;
      margin: 0 auto;
    }

    /* Two columns on tablets and small computers */
    @media (min-width: 600px) {
      .gallery {
        grid-template-columns: 1fr 1fr;
      }
    }

    /* Three columns on large screens and TVs */
    @media (min-width: 1100px) {
      .gallery {
        grid-template-columns: 1fr 1fr 1fr;
      }
    }

    .gallery img {
      max-width: 100%;
      width: auto;
      height: auto;
      cursor: pointer; /* hint that it's clickable */
    }

    /* Fullscreen overlay */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.9);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .lightbox.open {
      display: flex;
    }

    .lightbox img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .lightbox-close {
      position: fixed;
      top: 16px;
      right: 20px;
      font-family: 'DM Sans', sans-serif;
      font-size: 28px;
      line-height: 1;
      color: #1a1a1a;
      background: none;
      border: none;
      cursor: pointer;
      z-index: 1001;
    }

    .lightbox-close:hover {
      opacity: 0.6;
    }

    /* ===== Carousel (adapted from the homepage) ===== */
    .carousel {
      overflow: hidden;
      position: relative;
      margin: 0 auto 40px auto;
      max-width: 1600px;
      border-radius: 10px;
      border: 1px solid #242424;
      box-shadow: 0px 2px 0px #000000;
      /* Clicking does nothing — the whole strip ignores pointer events */
      pointer-events: none;
    }

    .carousel-track {
      display: flex;
      width: max-content;
      animation: slide 40s linear infinite;
      will-change: transform;
      backface-visibility: hidden;
    }

    .carousel-track img {
      height: 260px;
      width: auto;
      object-fit: cover;
      flex-shrink: 0;
      display: block;
    }

    /* JS-drawn noise placeholder, shown until images finish loading then faded */
    .carousel-placeholder {
      position: absolute;
      top: -60px;
      left: -60px;
      width: calc(100% + 120px);
      height: calc(100% + 120px);
      z-index: 2;
      pointer-events: none;
      filter: blur(14px);
      transition: opacity 0.6s ease;
    }

    .carousel.is-ready .carousel-placeholder {
      opacity: 0;
    }

    @keyframes slide {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    @media (max-width: 600px) {
      .carousel-track img {
        height: 150px;
      }
    }

    /* Respect users who prefer reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .carousel-track {
        animation: none;
      }
    }
  </style>
</head>
<body>

  <!-- Looping carousel (clicking does nothing) -->
  <div class="carousel" id="carousel" aria-hidden="true">
    <canvas class="carousel-placeholder" aria-hidden="true"></canvas>
    <div class="carousel-track" id="carousel-track"></div>
  </div>

  <h1>2026-27 Dartmouth Sports Branding Look</h1>

  <div class="gallery" id="gallery"></div>

  <!-- Fullscreen viewer -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightbox-close" aria-label="Close">&times;</button>
    <img id="lightbox-img" src="" alt="">
  </div>

  <script>
    // List your image paths here — just add/remove lines:
    const images = [
      "../Assets/images/Branding Look/Televised Game.jpg",
      "../Assets/images/Branding Look/All Academic.jpg",
      "../Assets/images/Branding Look/StoryScore Update.jpg",
      "../Assets/images/Branding Look/3_4 (X)Score Update.jpg",
      "../Assets/images/Branding Look/All-Ivy.jpg",
      "../Assets/images/Branding Look/Birthday.jpg",
      "../Assets/images/Branding Look/Socials (3_4)AOTW.jpg",
      "../Assets/images/Branding Look/Web (16_9)AOTW.jpg",
      "../Assets/images/Branding Look/Ranked.jpg",
      "../Assets/images/Branding Look/This Week in Dartmouth Sports.jpg",
      "../Assets/images/Branding Look/Social (3_4)Starting5.jpg",
      "../Assets/images/Branding Look/Story (9_16)Starting5.jpg",
      "../Assets/images/Branding Look/Gameday3.jpg",
      "../Assets/images/Branding Look/Up Next.jpg",
      "../Assets/images/Branding Look/Gameday2.jpg",
      "../Assets/images/Branding Look/Quote.jpg",
      "../Assets/images/Branding Look/Gameday.jpg",
      "../Assets/images/Branding Look/Schedule Poster MIH 2026-27.jpg",
      "../Assets/images/Branding Look/Win Graphic.jpg",
      "../Assets/images/Branding Look/WebWelcome to t.jpg",
      "../Assets/images/Branding Look/SocialWelcome to t.jpg",
      "../Assets/images/Branding Look/Senior Spotlight.jpg"
    ];

    const gallery = document.getElementById("gallery");
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightbox-img");
    const lightboxClose = document.getElementById("lightbox-close");

    images.forEach(path => {
      const img = document.createElement("img");
      img.src = path;
      img.alt = "";
      img.addEventListener("click", () => {
        lightboxImg.src = path;
        lightbox.classList.add("open");
      });
      gallery.appendChild(img);
    });

    function closeLightbox() {
      lightbox.classList.remove("open");
      lightboxImg.src = "";
    }

    // Close on X button
    lightboxClose.addEventListener("click", closeLightbox);

    // Close on clicking the dark background (but not the image itself)
    lightbox.addEventListener("click", (e) => {
      if (e.target === lightbox) closeLightbox();
    });

    // Close on Escape key
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeLightbox();
    });

    /* ===== Carousel =====
       A curated subset keeps the top strip light and fast to load.
       Add or remove lines freely — the loop duplicates them automatically. */
    const carouselImages = [
      "../Assets/images/Branding Look/Web (16_9)AOTW.jpg",
      "../Assets/images/Branding Look/Schedule Poster MIH 2026-27.jpg",
      "../Assets/images/Branding Look/Gameday.jpg",
      "../Assets/images/Branding Look/Ranked.jpg",
      "../Assets/images/Branding Look/This Week in Dartmouth Sports.jpg",
      "../Assets/images/Branding Look/Senior Spotlight.jpg",
      "../Assets/images/Branding Look/All-Ivy.jpg",
      "../Assets/images/Branding Look/Quote.jpg"
    ];

    const carousel = document.getElementById("carousel");
    const carouselTrack = document.getElementById("carousel-track");

    // Build the track twice so the scroll loops seamlessly
    [...carouselImages, ...carouselImages].forEach(path => {
      const img = document.createElement("img");
      img.src = path;
      img.alt = "";
      img.decoding = "async";
      carouselTrack.appendChild(img);
    });

    // Soft drifting noise placeholder, drawn in JS so it shows on first paint.
    // The carousel is already visible and scrolling; this just fades out on top.
    (function paintPlaceholder() {
      const canvas = carousel.querySelector(".carousel-placeholder");
      if (!canvas || !canvas.getContext) return;
      const ctx = canvas.getContext("2d");
      const cols = 10, rows = 6;
      canvas.width = cols;
      canvas.height = rows;
      const tint = [243, 247, 255], range = 10;
      function noise() {
        const frame = ctx.createImageData(cols, rows);
        for (let i = 0; i < frame.data.length; i += 4) {
          const d = Math.floor(Math.random() * range);
          frame.data[i] = Math.min(255, tint[0] + d);
          frame.data[i + 1] = Math.min(255, tint[1] + d);
          frame.data[i + 2] = Math.min(255, tint[2] + d);
          frame.data[i + 3] = 255;
        }
        ctx.putImageData(frame, 0, 0);
      }
      noise();
      const id = setInterval(noise, 1500);

      function reveal() {
        carousel.classList.add("is-ready");
        clearInterval(id);
      }

      // Fade the placeholder once images are ready — but never wait forever
      const imgs = Array.from(carouselTrack.querySelectorAll("img"));
      Promise.all(imgs.map(img =>
        img.complete ? Promise.resolve()
          : new Promise(r => { img.addEventListener("load", r); img.addEventListener("error", r); })
      )).then(reveal);

      // Safety net: reveal after 3s no matter what
      setTimeout(reveal, 3000);
    })();
  </script>

</body>
</html>
